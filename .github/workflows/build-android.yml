name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout mobile fork
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Godot 4.7 and export templates
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip
          unzip -q Godot_v4.7-stable_linux.x86_64.zip
          sudo mv Godot_v4.7-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          wget -q https://github.com/godotengine/godot/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz
          mkdir -p "$HOME/.local/share/godot/export_templates/4.7.stable"
          unzip -q Godot_v4.7-stable_export_templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/4.7.stable/"

      - name: Configure Godot Android paths
        run: |
          mkdir -p "$HOME/.config/godot" "$HOME/.android" build
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore "$HOME/.android/debug.keystore" -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/java_sdk_path = "$JAVA_HOME"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          EOF

      - name: Import and validate project
        run: godot --headless --editor --path . --quit

      - name: Export APK
        run: godot --headless --path . --export-debug "Android" build/ProjectNova-Mobile.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProjectNova-Mobile-APK
          path: build/ProjectNova-Mobile.apk
          if-no-files-found: error
